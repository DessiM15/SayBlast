<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F6D365;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FDA085;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect x="32" y="32" width="448" height="448" rx="96" ry="96" fill="url(#bgB)"/>
  
  <!-- Speed/motion lines (left side, horizontal) -->
  <line x1="56" y1="180" x2="120" y2="180" stroke="white" stroke-width="10" stroke-linecap="round" opacity="0.5"/>
  <line x1="72" y1="220" x2="112" y2="220" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.4"/>
  <line x1="56" y1="260" x2="128" y2="260" stroke="white" stroke-width="10" stroke-linecap="round" opacity="0.5"/>
  <line x1="80" y1="300" x2="116" y2="300" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.35"/>
  <line x1="64" y1="340" x2="108" y2="340" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.25"/>
  
  <!-- Tilted speech bubble body (slight rotation for motion feel) -->
  <g transform="translate(280, 240) rotate(6)">
    <rect x="-148" y="-116" width="280" height="216" rx="60" fill="white" opacity="0.95"/>
    <path d="M -88 100 L -120 156 L -20 100" fill="white" opacity="0.95"/>
    
    <!-- Friendly eyes -->
    <circle cx="-44" cy="-8" r="20" fill="url(#bgB)"/>
    <circle cx="44" cy="-8" r="20" fill="url(#bgB)"/>
    
    <!-- Eye sparkle -->
    <circle cx="-36" cy="-16" r="6" fill="white" opacity="0.9"/>
    <circle cx="52" cy="-16" r="6" fill="white" opacity="0.9"/>
    
    <!-- Excited open smile -->
    <path d="M -32 44 Q 0 88 32 44" fill="url(#bgB)" opacity="0.3"/>
    <path d="M -32 44 Q 0 88 32 44" fill="none" stroke="url(#bgB)" stroke-width="10" stroke-linecap="round"/>
  </g>
  
  <!-- Blast particles ahead (right side) -->
  <circle cx="432" cy="160" r="8" fill="white" opacity="0.5"/>
  <circle cx="448" cy="212" r="6" fill="white" opacity="0.4"/>
  <circle cx="440" cy="268" r="7" fill="white" opacity="0.35"/>
  <circle cx="420" cy="132" r="5" fill="white" opacity="0.3"/>
</svg>
